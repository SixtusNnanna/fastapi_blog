{% extends "base.html" %}

{% block title %}
<title>
    Sign UP
</title>
{% endblock %}

{% block content %}
{% for error in errors %}
    <div class="alert alert-danger">
        <li>
            {{error}}
        </li>
    </div>
{% endfor %}
<div class="container">
    <div class="text-center display-4">Register</div>
    <div class="row mt-3 mb-5">
        <div class="col-3"></div>
        <div class="col-6">
            <form method="post">
                <label for="email">Email</label>
                <input type="email" required class="form-control mb-2" name="email" value="{{email}}" placeholder="Enter your email">
                <label for="password">Passwword</label>
                <input type="password" class="form-control mb-2" name="password" placeholder="Choose A secure password" value="{{password}}">
                <button class="btn btn-outline-success">Create an Account </button>
            </form>

        </div>
        <div class="col-3"></div>
    </div>
</div>

{% endblock %}
